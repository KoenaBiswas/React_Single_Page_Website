name: Deploy React App to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout code
      - uses: actions/checkout@v3

      # 2) Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      # 3) Change to React app directory
      - name: Change Directory
        run: cd React_Single_Page_Website

      # 4) Install dependencies
      - name: Install Dependencies
        run: |
          cd React_Single_Page_Website
          npm install

      # 5) Build the React app
      - name: Build
        run: |
          cd React_Single_Page_Website
          npm run build

      # 6) Deploy to gh-pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./React_Single_Page_Website/build
          commit_message: "Auto Deploy from GitHub Actions"
