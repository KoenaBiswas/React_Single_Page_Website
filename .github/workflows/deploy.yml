name: Deploy React SPA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      # 3. Install dependencies in project subfolder
      - name: Install dependencies
        working-directory: ./singlepage-website
        run: npm install

      # 4. Build the React app
      - name: Build
        working-directory: ./singlepage-website
        run: npm run build

      # 5. Deploy to gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./singlepage-website/build
          commit_message: "Deploy React SPA"
